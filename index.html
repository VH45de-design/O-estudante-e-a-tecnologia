<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_FAILURE: THE STUDENT'S LOOP</title>
    <style>
        body {
            background-color: #000;
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.3);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
/**
 * SYSTEM_FAILURE: THE STUDENT'S LOOP
 * Um RPG de tecnologia inspirado em Undertale.
 */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- CONFIGURAÇÕES E ESTADO DO JOGO ---
let state = "INTRO"; // INTRO, MENU, EXPLORE, BATTLE, GAMEOVER
let currentRoom = 0;
let frame = 0;
let introTimer = 0;
let playerName = "";
let karma = 0; // > 0: Pacifista (Debug), < 0: Genocida (Compile)

const player = {
    pos: { x: 400, y: 500 },
    hp: 20,
    maxHp: 20,
    atk: 5,
    hasRoot: false,
    speed: 4
};

const enemy = {
    name: "FIREWALL_v1.0",
    hp: 120,
    maxHp: 120,
    color: "#ff3333"
};

const dialogue = {
    text: "",
    display: "",
    counter: 0,
    active: false,
    callback: null
};

let keys = {};
let selectedBtn = 0;

// --- LISTENERS ---
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    
    if (state === "MENU") {
        if (e.key === "Enter" && playerName.length > 0) state = "EXPLORE";
        if (e.key === "Backspace") playerName = playerName.slice(0, -1);
        if (e.key.length === 1 && playerName.length < 10 && /[a-zA-Z0-9]/.test(e.key)) playerName += e.key;
    }

    if (state === "BATTLE" && !dialogue.active) {
        if (e.key === "ArrowLeft") selectedBtn = (selectedBtn - 1 + 4) % 4;
        if (e.key === "ArrowRight") selectedBtn = (selectedBtn + 1) % 4;
        if (e.key === "z") handleBattleAction();
    }

    if (dialogue.active && e.key === "x") {
        dialogue.active = false;
        if (dialogue.callback) dialogue.callback();
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);

// --- FUNÇÕES DE DESENHO (GRÁFICOS PROCEDURAIS) ---

function drawStudent(x, y) {
    let bob = Math.sin(frame * 0.1) * 3;
    ctx.fillStyle = "#4a4e69"; ctx.fillRect(x, y + 12 + bob, 30, 28); // Moletom
    ctx.fillStyle = "#ffdbac"; ctx.fillRect(x + 5, y + bob, 20, 16);  // Rosto
    ctx.fillStyle = "#222"; ctx.fillRect(x + 5, y + bob, 20, 6);     // Cabelo
    ctx.fillStyle = "#000"; ctx.fillRect(x + 8, y + 9 + bob, 4, 3);   // Olho L
    ctx.fillStyle = "#000"; ctx.fillRect(x + 18, y + 9 + bob, 4, 3);  // Olho R
    ctx.fillStyle = "#ff3333"; ctx.fillRect(x - 4, y + 15 + bob, 8, 20); // Mochila
}

function drawPROF(x, y) {
    let float = Math.sin(frame * 0.05) * 10;
    ctx.fillStyle = "#dcdcb4"; ctx.fillRect(x, y + float, 60, 55); // Carcaça
    ctx.fillStyle = "#002200"; ctx.fillRect(x + 6, y + 6 + float, 48, 35); // Tela
    ctx.fillStyle = "#00ff66";
    ctx.font = "14px Courier New";
    ctx.fillText("P.R.O.F", x + 10, y + 25 + float); // Rosto Digital
}

function drawFirewall(x, y) {
    ctx.strokeStyle = "#ff3333";
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        let angle = (i * Math.PI) / 3 + (frame * 0.02);
        let px = x + 50 * Math.cos(angle);
        let py = y + 50 * Math.sin(angle);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = "rgba(255, 0, 0, 0.2)";
    ctx.fill();
}

function drawScanlines() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
    for (let i = 0; i < 600; i += 4) ctx.fillRect(0, i, 800, 2);
}

// --- LÓGICA DE BATALHA ---

function handleBattleAction() {
    const btns = ["COMPILAR", "DEBUGAR", "MEMÓRIA", "LOGOUT"];
    let action = btns[selectedBtn];

    if (action === "COMPILAR") {
        enemy.hp -= player.atk;
        karma -= 1;
        startDialogue(`Você compilou o código hostil causando ${player.atk} de dano!`, () => {
            if (enemy.hp <= 0) winGame();
        });
    } else if (action === "DEBUGAR") {
        karma += 1;
        startDialogue("Você comentou as linhas agressivas do Firewall. Ele está lento.");
    } else if (action === "LOGOUT") {
        if (karma > 2 || enemy.hp < 40) {
            startDialogue("Você encerrou a sessão pacificamente. O sistema está salvo.", () => location.reload());
        } else {
            startDialogue("ERRO: Logout negado. O processo ainda é uma ameaça.");
        }
    }
}

function startDialogue(txt, cb = null) {
    dialogue.text = txt;
    dialogue.counter = 0;
    dialogue.active = true;
    dialogue.callback = cb;
}

function winGame() {
    state = "ENDING";
    startDialogue("SISTEMA DELETADO. Você se tornou o novo Administrador Root.");
}

// --- LOOP DO JOGO ---

function loop() {
    frame++;
    ctx.fillStyle = "#05050a";
    ctx.fillRect(0, 0, 800, 600);

    if (state === "INTRO") {
        introTimer++;
        const lines = [
            "No ano 202X, um código proibido vazou...",
            "UNDERTALE.EXE fundiu-se ao servidor da faculdade.",
            "Lógica e Realidade tornaram-se instáveis.",
            "Um estudante entra no sistema para salvar seu TCC.",
            "Identifique-se para continuar..."
        ];
        let idx = Math.min(lines.length - 1, Math.floor(introTimer / 180));
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.font = "20px Courier New";
        ctx.fillText(lines[idx], 400, 300);
        if (introTimer > 900) state = "MENU";
    }

    else if (state === "MENU") {
        // Grid animado
        ctx.strokeStyle = "#003300";
        for(let i=0; i<800; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 600); ctx.stroke(); }
        
        ctx.fillStyle = "#00ff66";
        ctx.font = "bold 60px Courier New";
        ctx.textAlign = "center";
        let glitch = Math.random() > 0.95 ? (Math.random()-0.5)*10 : 0;
        ctx.fillText("SYSTEM_FAILURE", 400 + glitch, 200);
        
        ctx.font = "24px Courier New";
        ctx.fillText(`USUÁRIO: ${playerName}_`, 400, 350);
        ctx.fillStyle = "#555";
        ctx.font = "16px Courier New";
        ctx.fillText("[Pressione ENTER para carregar perfil]", 400, 500);
    }

    else if (state === "EXPLORE") {
        if (!dialogue.active) {
            if (keys["ArrowLeft"]) player.pos.x -= player.speed;
            if (keys["ArrowRight"]) player.pos.x += player.speed;
            if (keys["ArrowUp"]) player.pos.y -= player.speed;
            if (keys["ArrowDown"]) player.pos.y += player.speed;
        }

        drawPROF(400, 200);
        drawStudent(player.pos.x, player.pos.y);
        
        ctx.fillStyle = "#00ff66";
        ctx.font = "18px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("SALA DE CONTROLE - NÍVEL 01", 400, 50);

        // Interação com PROF
        let d = Math.hypot(player.pos.x - 400, player.pos.y - 200);
        if (d < 60 && !player.hasRoot) {
            player.hasRoot = true;
            player.atk = 40;
            startDialogue("P.R.O.F: Aluno! Use o ACESSO ROOT. O Firewall à frente é imenso!");
        }

        if (player.pos.y < 50) {
            state = "BATTLE";
            startDialogue("ALERTA: FIREWALL BLOQUEANDO ACESSO. INICIANDO COMBATE.");
        }
    }

    else if (state === "BATTLE") {
        drawFirewall(400, 150);
        
        // UI de Batalha
        ctx.strokeStyle = "white";
        ctx.lineWidth = 4;
        ctx.strokeRect(50, 350, 700, 180);
        
        ctx.fillStyle = "white";
        ctx.textAlign = "left";
        ctx.font = "22px Courier New";
        ctx.fillText(`${playerName.toUpperCase()}  HP: ${player.hp}/20`, 50, 330);
        ctx.textAlign = "right";
        ctx.fillStyle = "#ff3333";
        ctx.fillText(`ENEMY HP: ${enemy.hp}`, 750, 330);

        const btns = ["COMPILAR", "DEBUGAR", "MEMÓRIA", "LOGOUT"];
        btns.forEach((btn, i) => {
            ctx.textAlign = "center";
            ctx.fillStyle = selectedBtn === i ? "yellow" : "white";
            ctx.fillText(`[${btn}]`, 140 + i * 175, 560);
        });

        // Alma (O Cursor)
        ctx.fillStyle = "cyan";
        ctx.beginPath();
        ctx.arc(60 + selectedBtn * 175, 552, 8, 0, Math.PI * 2);
        ctx.fill();
    }

    // Caixa de Diálogo Typewriter
    if (dialogue.active) {
        ctx.fillStyle = "black";
        ctx.fillRect(45, 355, 710, 170);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.strokeRect(45, 355, 710, 170);
        
        dialogue.counter = Math.min(dialogue.counter + 0.5, dialogue.text.length);
        ctx.fillStyle = "white";
        ctx.textAlign = "left";
        ctx.font = "20px Courier New";
        let wrapText = dialogue.text.slice(0, Math.floor(dialogue.counter));
        ctx.fillText(wrapText, 70, 400);
        
        ctx.fillStyle = "#555";
        ctx.font = "14px Courier New";
        ctx.fillText("(Aperte X para continuar)", 550, 510);
    }

    drawScanlines();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
