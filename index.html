<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_FAILURE: The Student's Loop</title>
    <style>
        body {
            background-color: #05050a;
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.2);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- ESTADOS E VARIÁVEIS ---
let state = "INTRO";
let playerName = "";
let introTimer = 0;
let frameCount = 0;
let selectedBtn = 0;
let playerPos = { x: 400, y: 500 };
let enemyHp = 100;
let playerHp = 20;
let atk = 5;
let hasRoot = false;
let dialogue = { text: "", active: false, counter: 0 };
let keys = {};

// --- INPUTS ---
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    
    if (state === "MENU") {
        if (e.key === "Enter" && playerName.length > 0) state = "EXPLORE";
        if (e.key === "Backspace") playerName = playerName.slice(0, -1);
        if (e.key.length === 1 && playerName.length < 10) playerName += e.key;
    }

    if (state === "BATTLE" && !dialogue.active) {
        if (e.key === "ArrowLeft") selectedBtn = (selectedBtn - 1 + 4) % 4;
        if (e.key === "ArrowRight") selectedBtn = (selectedBtn + 1) % 4;
        if (e.key === "z") startBattleAction();
    }

    if (dialogue.active && e.key === "x") dialogue.active = false;
});
window.addEventListener("keyup", e => keys[e.key] = false);

// --- FUNÇÕES DE DESENHO ---

function drawText(txt, x, y, size = "20px", color = "white", align = "left") {
    ctx.fillStyle = color;
    ctx.font = `${size} 'Courier New'`;
    ctx.textAlign = align;
    ctx.fillText(txt, x, y);
}

function startBattleAction() {
    if (selectedBtn === 0) { // COMPILAR
        enemyHp -= atk;
        startDialogue(`Você compilou o código hostil! Causou ${atk} de dano.`);
    } else if (selectedBtn === 1) { // DEBUGAR
        startDialogue("Você analisou o log de erros. O Firewall parece confuso.");
    } else if (selectedBtn === 3) { // LOGOUT
        if (enemyHp < 50) {
            startDialogue("Sessão encerrada. Você salvou o sistema pacificamente.");
            setTimeout(() => location.reload(), 3000);
        } else {
            startDialogue("Erro: O processo ainda está em execução crítica.");
        }
    }
}

function startDialogue(txt) {
    dialogue.text = txt;
    dialogue.counter = 0;
    dialogue.active = true;
}

function drawStudent(x, y) {
    let bob = Math.sin(frameCount * 0.1) * 3;
    ctx.fillStyle = "#46465a"; ctx.fillRect(x, y + 10 + bob, 30, 30); // Corpo
    ctx.fillStyle = "#ffcc96"; ctx.fillRect(x + 5, y + bob, 20, 15);  // Cabeça
    ctx.fillStyle = "black"; ctx.fillRect(x + 8, y + 7 + bob, 4, 3);   // Olho
    ctx.fillStyle = "black"; ctx.fillRect(x + 18, y + 7 + bob, 4, 3);  // Olho
}

function drawProf(x, y) {
    let float = Math.sin(frameCount * 0.05) * 10;
    ctx.fillStyle = "#f5f5dc"; ctx.fillRect(x, y + float, 50, 45); // Monitor
    ctx.fillStyle = "#002800"; ctx.fillRect(x + 5, y + 5 + float, 40, 30); // Tela
    ctx.fillStyle = "#00ff64"; drawText(":)", x + 25, y + 25 + float, "20px", "#00ff64", "center");
}

function drawScanlines() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
    for (let i = 0; i < 600; i += 4) ctx.fillRect(0, i, 800, 2);
}

// --- LOOP PRINCIPAL ---

function update() {
    frameCount++;

    if (state === "INTRO") {
        introTimer++;
        if (introTimer > 600) state = "MENU";
    }

    if (state === "EXPLORE" && !dialogue.active) {
        if (keys["ArrowLeft"]) playerPos.x -= 4;
        if (keys["ArrowRight"]) playerPos.x += 4;
        if (keys["ArrowUp"]) playerPos.y -= 4;
        if (keys["ArrowDown"]) playerPos.y += 4;

        // Colisão com P.R.O.F
        let dist = Math.hypot(playerPos.x - 400, playerPos.y - 200);
        if (dist < 50 && !hasRoot) {
            hasRoot = true;
            atk = 40;
            startDialogue("P.R.O.F: Pegue o ACESSO ROOT! Use o botão COMPILAR para salvar seu TCC!");
        }

        if (playerPos.y < 50) state = "BATTLE";
    }
}

function draw() {
    ctx.fillStyle = "#05050a";
    ctx.fillRect(0, 0, 800, 600);

    if (state === "INTRO") {
        let lines = ["No ano 202X...", "O código de UNDERTALE vazou na rede da faculdade.", "A realidade virou um loop de erros.", "Um estudante entra no servidor central..."];
        let cur = Math.floor(introTimer / 150);
        if (cur < lines.length) drawText(lines[cur], 400, 300, "20px", "white", "center");
    }

    else if (state === "MENU") {
        // Grid animado
        ctx.strokeStyle = "#002800";
        for(let i=0; i<800; i+=50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 600); ctx.stroke(); }
        
        let glitch = Math.random() > 0.9 ? Math.random()*5 : 0;
        drawText("SYSTEM_FAILURE", 400 + glitch, 200, "60px", "#00ff64", "center");
        drawText(`USUÁRIO: ${playerName}_`, 400, 350, "24px", "cyan", "center");
        drawText("[Pressione ENTER para Logar]", 400, 500, "15px", "gray", "center");
    }

    else if (state === "EXPLORE") {
        drawProf(400, 200);
        drawStudent(playerPos.x, playerPos.y);
        drawText("SERVIDOR PRINCIPAL - SALA DE CONTROLE", 400, 50, "20px", "#00ff64", "center");
    }

    else if (state === "BATTLE") {
        // Boss
        ctx.strokeStyle = "red";
        ctx.lineWidth = 4;
        ctx.strokeRect(350, 100, 100, 100);
        drawText("FIREWALL_CORE", 400, 80, "20px", "red", "center");

        // UI
        ctx.strokeStyle = "white";
        ctx.strokeRect(50, 350, 700, 180);
        drawText(`${playerName.toUpperCase()}  HP: ${playerHp}/20`, 50, 330, "20px", "white");
        drawText(`ENEMY HP: ${enemyHp}`, 750, 330, "20px", "red", "right");

        const btns = ["COMPILAR", "DEBUGAR", "MEMÓRIA", "LOGOUT"];
        btns.forEach((btn, i) => {
            let color = selectedBtn === i ? "yellow" : "white";
            drawText(`[${btn}]`, 120 + i * 180, 560, "22px", color, "center");
        });

        // Alma
        ctx.fillStyle = "cyan";
        ctx.beginPath();
        ctx.arc(45 + selectedBtn * 180, 552, 8, 0, Math.PI * 2);
        ctx.fill();
    }

    if (dialogue.active) {
        ctx.fillStyle = "black";
        ctx.fillRect(40, 400, 720, 120);
        ctx.strokeStyle = "white";
        ctx.strokeRect(40, 400, 720, 120);
        
        dialogue.counter = Math.min(dialogue.counter + 0.5, dialogue.text.length);
        drawText(dialogue.text.slice(0, Math.floor(dialogue.counter)), 60, 440, "20px", "white");
        drawText("(Aperte X para continuar)", 740, 500, "14px", "gray", "right");
    }

    drawScanlines();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
